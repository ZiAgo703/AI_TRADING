version: "3.9"

services:
  analyzer:
    build: .
    container_name: ai_trading_analyzer
    volumes:
      - ./output:/app/output
      - ./configs:/app/configs
    command: python main.py
    restart: "no"

  dashboard:
    build: .
    container_name: ai_trading_dashboard
    ports:
      - "8501:8501"
    volumes:
      - ./output:/app/output
      - ./configs:/app/configs
    command: streamlit run dashboard/app.py
    restart: unless-stopped
